name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd shared-models && uv sync --quiet
          cd ../agent-service && uv sync --quiet
          cd ../request-manager && uv sync --quiet
          cd ../kubernetes-partner-agent && uv sync --quiet

      - name: Run shared-models tests
        run: cd shared-models && uv run python -m pytest tests/ --cov=shared_models --cov-report=term-missing --cov-report=json:coverage.json --cov-fail-under=97 -q

      - name: Run agent-service tests
        run: cd agent-service && uv run python -m pytest tests/ --cov=agent_service --cov-report=term-missing --cov-report=json:coverage.json --cov-fail-under=99 -q

      - name: Run request-manager tests
        run: cd request-manager && uv run python -m pytest tests/ --cov=request_manager --cov-report=term-missing --cov-report=json:coverage.json --cov-fail-under=97 -q

      - name: Run kubernetes-partner-agent tests
        run: cd kubernetes-partner-agent && uv run python -m pytest tests/ --cov=kubernetes_agent --cov-report=term-missing --cov-report=json:coverage.json --cov-fail-under=97 -q

      - name: Run agent-service A2A protocol E2E
        run: cd agent-service && uv run python test_a2a_e2e.py

      - name: Run kubernetes-partner-agent A2A protocol E2E
        run: cd kubernetes-partner-agent && uv run python test_a2a_e2e.py

      - name: Generate coverage badges
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdir -p .badges
          for pkg in shared-models agent-service request-manager kubernetes-partner-agent; do
            if [ -f "$pkg/coverage.json" ]; then
              pct=$(python3 -c "import json; d=json.load(open('$pkg/coverage.json')); print(int(d['totals']['percent_covered_display']))")
              if [ "$pct" -ge 95 ]; then color="brightgreen";
              elif [ "$pct" -ge 90 ]; then color="green";
              elif [ "$pct" -ge 80 ]; then color="yellow";
              else color="red"; fi
              echo "{\"schemaVersion\":1,\"label\":\"$pkg\",\"message\":\"${pct}%\",\"color\":\"$color\"}" > .badges/${pkg}-coverage.json
            fi
          done

      - name: Push coverage badges
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .badges/*.json
          git diff --cached --quiet || git commit -m "ci: update coverage badges [skip ci]" && git push

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd shared-models && uv sync --quiet
          cd ../agent-service && uv sync --quiet
          cd ../request-manager && uv sync --quiet
          cd ../kubernetes-partner-agent && uv sync --quiet

      - name: Check formatting (isort)
        run: |
          cd shared-models && uv run --with isort isort --check-only --diff --skip .venv --skip alembic .
          cd ../agent-service && uv run --with isort isort --check-only --diff --skip .venv .
          cd ../request-manager && uv run --with isort isort --check-only --diff --skip .venv .
          cd ../kubernetes-partner-agent && uv run --with isort isort --check-only --diff --skip .venv .

      - name: Type check (mypy)
        run: |
          cd shared-models && uv run --with mypy mypy --strict . || true
          cd ../agent-service && uv run --with mypy mypy --strict . || true
          cd ../request-manager && uv run --with mypy mypy --strict . || true
          cd ../kubernetes-partner-agent && uv run --with mypy mypy --strict . || true

  lockfiles:
    name: Check Lockfiles
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify lockfiles are up-to-date
        run: |
          cd shared-models && uv lock --check
          cd ../agent-service && uv lock --check
          cd ../request-manager && uv lock --check
          cd ../kubernetes-partner-agent && uv lock --check

  opa-tests:
    name: OPA Policy Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -L -o /usr/local/bin/opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa

      - name: Run OPA policy tests
        run: opa test policies/ -v

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, opa-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Build and start full stack
        run: make setup
        timeout-minutes: 15

      - name: Run E2E tests
        run: bash scripts/test.sh
        timeout-minutes: 5

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== Request Manager ==="
          docker logs partner-request-manager-full 2>&1 | tail -50
          echo ""
          echo "=== Agent Service ==="
          docker logs partner-agent-service-full 2>&1 | tail -50
          echo ""
          echo "=== RAG API ==="
          docker logs partner-rag-api-full 2>&1 | tail -50
          echo ""
          echo "=== OPA ==="
          docker logs partner-opa-full 2>&1 | tail -20
          echo ""
          echo "=== Keycloak ==="
          docker logs partner-keycloak-full 2>&1 | tail -20

      - name: Cleanup
        if: always()
        run: make clean
